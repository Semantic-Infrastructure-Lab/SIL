<!DOCTYPE html>
<html>
<head>
<title>SIL Logo Preview</title>
<style>
  body { margin: 0; font-family: sans-serif; }
  .row { display: flex; gap: 0; }
  .swatch {
    flex: 1;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .swatch label { font-size: 12px; opacity: 0.6; }
  .white  { background: #ffffff; color: #000; }
  .light  { background: #f0f4f8; color: #000; }
  .dark   { background: #1a2332; color: #fff; }
  .black  { background: #000000; color: #fff; }
  .checker {
    background-image: linear-gradient(45deg, #ccc 25%, transparent 25%),
                      linear-gradient(-45deg, #ccc 25%, transparent 25%),
                      linear-gradient(45deg, transparent 75%, #ccc 75%),
                      linear-gradient(-45deg, transparent 75%, #ccc 75%);
    background-size: 20px 20px;
    background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
    background-color: #fff;
    color: #000;
  }
  img { width: 160px; height: 160px; object-fit: contain; }
  .sizes { display: flex; gap: 20px; align-items: center; padding: 20px; background: #f9f9f9; border-top: 1px solid #ddd; }
  .sizes img { width: auto; height: auto; }
</style>
</head>
<body>

<div class="row">
  <div class="swatch white">
    <img src="sil-logo-transparent.png">
    <label>White</label>
  </div>
  <div class="swatch light">
    <img src="sil-logo-transparent.png">
    <label>Light (#f0f4f8)</label>
  </div>
  <div class="swatch checker">
    <img src="sil-logo-transparent.png">
    <label>Transparent check</label>
  </div>
  <div class="swatch dark">
    <img src="sil-logo-transparent.png">
    <label>Dark (#1a2332)</label>
  </div>
  <div class="swatch black">
    <img src="sil-logo-transparent.png">
    <label>Black</label>
  </div>
</div>

<div class="sizes">
  <img src="favicon-16.png" width="16" height="16"> 16px
  <img src="favicon-32.png" width="32" height="32"> 32px
  <img src="sil-logo-128.png" width="128" height="128"> 128px
  <img src="sil-logo-256.png" width="256" height="256"> 256px
</div>

</body>
</html>
